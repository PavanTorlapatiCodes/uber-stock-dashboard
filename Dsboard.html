<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Uber Stock Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            font-size: 2.8em;
            margin-bottom: 10px;
            color: #FFD700;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            text-align: center;
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            margin: 10px 0;
            color: #FFD700;
        }
        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .chart-section {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
            text-align: center;
        }
        .chart-title {
            font-size: 1.8em;
            margin-bottom: 20px;
        }
        .chart-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .data-section {
            margin-top: 40px;
        }
        .table-container {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            color: #333;
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 18px 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f8f9ff;
        }

        .download-btn {
            display: block;
            width: 250px;
            margin: 30px auto;
            padding: 15px 30px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(255,107,107,0.4);
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255,107,107,0.6);
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 2em; }
            .stats-grid { grid-template-columns: 1fr; }
            .table-container { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Uber Stock Dashboard</h1>
        <p class="subtitle">Built with Python, NumPy, Pandas, Matplotlib</p>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Price Change</div>
                <div class="stat-value" id="totalChange">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily Volatility</div>
                <div class="stat-value" id="volatility">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Return</div>
                <div class="stat-value" id="meanReturn">Loading...</div>
            </div>
        </div>

        <div class="chart-section">
            <h2 class="chart-title">Uber Stock Price + 5-Day Moving Average</h2>
            <img src="uber_chart.png" alt="Uber Stock Chart" class="chart-img">
        </div>

        <a href="uber_stock.csv" class="download-btn" download>Download CSV Data</a>

        <div class="data-section">
            <h2 style="text-align: center; margin-bottom: 20px; color: white;">Latest Stock Data (NumPy Analysis)</h2>
            <div class="table-container">
                <table id="stockTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Open</th>
                            <th>High</th>
                            <th>Low</th>
                            <th>Close</th>
                            <th>Returns %</th>
                            <th>MA 5-Day</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        fetch('uber_stock.csv')
            .then(response => response.text())
            .then(csv => {
                const lines = csv.split('\n').filter(line => line.trim());
                const data = lines.slice(1).map(line => {
                    const cols = line.split(',');
                    return {
                        date: cols[0] || '',
                        open: parseFloat(cols[1]) || 0,
                        high: parseFloat(cols[2]) || 0,
                        low: parseFloat(cols[3]) || 0,
                        close: parseFloat(cols[4]) || 0,
                        returns: parseFloat(cols[5]) || 0,
                        ma5: parseFloat(cols[6]) || 0
                    };
                }).filter(row => row.close > 0);

                if (data.length > 0) {
                    const firstClose = data[0].close;
                    const lastClose = data[data.length-1].close;
                    const totalChange = ((lastClose / firstClose) - 1) * 100;
                    const returns = data.map(d => d.returns).filter(r => !isNaN(r) && r !== 0);
                    const meanReturn = returns.length ? returns.reduce((a,b) => a+b, 0) / returns.length : 0;
                    const volatility = returns.length ? Math.sqrt(returns.reduce((a,b) => a + Math.pow(b - meanReturn, 2), 0) / returns.length) : 0;

                    document.getElementById('totalChange').textContent = totalChange.toFixed(1) + '%';
                    document.getElementById('volatility').textContent = volatility.toFixed(2) + '%';
                    document.getElementById('meanReturn').textContent = meanReturn.toFixed(2) + '%';

                    const tbody = document.querySelector('#stockTable tbody');
                    data.slice(-10).reverse().forEach(row => {
                        const tr = document.createElement('tr');
                        const returnColor = row.returns > 0 ? '#4CAF50' : '#f44336';
                        tr.innerHTML = `
                            <td>${row.date}</td>
                            <td>$${row.open.toFixed(2)}</td>
                            <td>$${row.high.toFixed(2)}</td>
                            <td>$${row.low.toFixed(2)}</td>
                            <td>$${row.close.toFixed(2)}</td>
                            <td style="color: ${returnColor}">${row.returns.toFixed(2)}%</td>
                            <td>$${row.ma5.toFixed(2)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            })
            .catch(err => {
                console.error('Error loading CSV:', err);
                document.getElementById('stats').innerHTML = '<p style="text-align:center; grid-column:1/-1;">CSV file not found. Run Python code first!</p>';
            });
    </script>
</body>
</html>
